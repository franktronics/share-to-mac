name: Build Mobile (iOS)

# The CI produces an *unsigned* .ipa that users re-sign locally with their
# own Apple ID using AltStore or similar tools.
# See docs/INSTALL_IOS.md for step-by-step instructions.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned .ipa
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install Node dependencies
        working-directory: mobile
        run: npm ci

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: mobile

      - name: Add ScreenCapture files to Xcode project
        working-directory: mobile
        run: bundle exec ruby scripts/setup_xcode.rb

      - name: Install CocoaPods dependencies
        working-directory: mobile/ios
        run: bundle exec pod install

      - name: Build .xcarchive (no-code-sign)
        working-directory: mobile
        run: |
          xcodebuild archive \
            -workspace ios/ShareToMac.xcworkspace \
            -scheme ShareToMac \
            -configuration Release \
            -archivePath build/ShareToMac.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -allowProvisioningUpdates

      # Pack the .app from the archive into a valid (unsigned) .ipa structure
      - name: Package .xcarchive into unsigned .ipa
        working-directory: mobile
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/ShareToMac.xcarchive/Products/Applications/ShareToMac.app \
                build/ipa/Payload/ShareToMac.app
          cd build/ipa
          zip -r ../ShareToMac-unsigned.ipa Payload
          cd ../..

      - name: Upload unsigned .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShareToMac-iOS-unsigned
          path: mobile/build/ShareToMac-unsigned.ipa
          retention-days: 30

      - name: Attach .ipa to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/build/ShareToMac-unsigned.ipa
