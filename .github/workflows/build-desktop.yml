name: Build Desktop (macOS)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build .dmg
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: desktop
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app with PyInstaller
        working-directory: desktop
        run: |
          pyinstaller \
            --name "ShareToMac" \
            --windowed \
            --onedir \
            --clean \
            --noconfirm \
            main.py

      # create-dmg produces a nicely formatted installer disk image
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package .app into .dmg
        working-directory: desktop
        run: |
          mkdir -p dist/dmg
          create-dmg \
            --volname "ShareToMac" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "ShareToMac.app" 150 185 \
            --hide-extension "ShareToMac.app" \
            --app-drop-link 450 185 \
            "dist/dmg/ShareToMac.dmg" \
            "dist/ShareToMac/"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShareToMac-macOS
          path: desktop/dist/dmg/ShareToMac.dmg
          retention-days: 30

      # Attach to GitHub Release if triggered by a tag
      - name: Attach .dmg to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/dmg/ShareToMac.dmg
